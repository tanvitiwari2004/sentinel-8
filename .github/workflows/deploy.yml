name: Deploy to Hugging Face
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git clone https://tanvitiwari2004:$HF_TOKEN@huggingface.co/spaces/tanvitiwari2004/sentinel-8 hf-space
          cp dashboard/app.py hf-space/app.py
          cp dashboard/compliance_mapper.py hf-space/compliance_mapper.py
          cp dashboard/llm_reporter.py hf-space/llm_reporter.py
          cp requirements.txt hf-space/requirements.txt
          cd hf-space
          git add .
          git commit -m "sync from GitHub" || echo "nothing to commit"
          git push